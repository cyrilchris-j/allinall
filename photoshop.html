<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Photoshop - Professional Photo Editor</title>
    <link rel="stylesheet" href="photoshop-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="photoshop-app">
        <!-- Menu Bar -->
        <div class="menu-bar">
            <div class="menu-item" data-menu="file">File</div>
            <div class="menu-item" data-menu="edit">Edit</div>
            <div class="menu-item" data-menu="image">Image</div>
            <div class="menu-item" data-menu="layer">Layer</div>
            <div class="menu-item" data-menu="select">Select</div>
            <div class="menu-item" data-menu="filter">Filter</div>
            <div class="menu-item" data-menu="view">View</div>
            <div class="menu-item" data-menu="window">Window</div>
            <div class="menu-item" data-menu="help">Help</div>
        </div>

        <!-- Options Bar -->
        <div class="options-bar">
            <div class="tool-options" id="toolOptions">
                <!-- Dynamic tool options will be inserted here -->
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="workspace">
            <!-- Left Toolbar -->
            <div class="toolbar" id="toolbar">
                <div class="tool-group">
                    <!-- Move/Artboard Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn active" data-tool="move" title="Move Tool (V)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13 6v5h5v-2h2v7h-2v-2h-5v5h-2v-5H6v2H4v-7h2v2h5V6h2z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="artboard" title="Artboard Tool">AB</button>
                        </div>
                    </div>

                    <!-- Selection Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="marquee-rect" title="Rectangular Marquee Tool (M)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm9-2h7v7h-7v-7zm2 2v3h3v-3h-3z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="marquee-ellipse" title="Elliptical Marquee Tool">O</button>
                        </div>
                    </div>

                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="lasso" title="Lasso Tool (L)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.19 0 2.34-.21 3.41-.6l3.59 3.6 1.41-1.41-3.6-3.59c.39-1.07.6-2.22.6-3.41 0-5.52-4.48-10-10-10zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="polygonal-lasso" title="Polygonal Lasso Tool">P</button>
                            <button class="dropdown-tool" data-tool="magnetic-lasso" title="Magnetic Lasso Tool">M</button>
                        </div>
                    </div>

                    <!-- Selection Tools 2 -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="quick-selection" title="Quick Selection Tool (W)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 5v4h2V5h4V3H5c-1.1 0-2 .9-2 2zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-16h-4v2h4v4h2V5c0-1.1-.9-2-2-2z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="magic-wand" title="Magic Wand Tool">W</button>
                            <button class="dropdown-tool" data-tool="object-selection" title="Object Selection Tool">O</button>
                        </div>
                    </div>

                    <!-- Crop Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="crop" title="Crop Tool (C)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7zm10-2V7c0-1.1-.9-2-2-2H9v2h6v6h2z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="slice" title="Slice Tool">S</button>
                            <button class="dropdown-tool" data-tool="perspective-crop" title="Perspective Crop Tool">P</button>
                        </div>
                    </div>

                    <!-- Eyedropper Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper Tool (I)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42zM6.92 19L5 17.08l8.06-8.06 1.92 1.92L6.92 19z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="color-sampler" title="Color Sampler Tool">S</button>
                            <button class="dropdown-tool" data-tool="ruler" title="Ruler Tool">R</button>
                            <button class="dropdown-tool" data-tool="note" title="Note Tool">N</button>
                        </div>
                    </div>

                    <!-- Spot Healing Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="spot-healing" title="Spot Healing Brush Tool (J)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="healing" title="Healing Brush Tool">H</button>
                            <button class="dropdown-tool" data-tool="patch" title="Patch Tool">P</button>
                            <button class="dropdown-tool" data-tool="content-aware-move" title="Content-Aware Move Tool">C</button>
                            <button class="dropdown-tool" data-tool="red-eye" title="Red Eye Tool">R</button>
                        </div>
                    </div>

                    <!-- Brush Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="brush" title="Brush Tool (B)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="pencil" title="Pencil Tool">P</button>
                            <button class="dropdown-tool" data-tool="color-replacement" title="Color Replacement Tool">C</button>
                            <button class="dropdown-tool" data-tool="mixer-brush" title="Mixer Brush Tool">M</button>
                        </div>
                    </div>

                    <!-- Clone Stamp Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="clone-stamp" title="Clone Stamp Tool (S)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20H7.66l7.57-7.57L20.59 7.07c.78-.78.78-2.05 0-2.83L16.55 3.59c-.39-.39-.9-.59-1.41-.59zM5.03 16L4 17.03 6.97 20l1.03-1.03L5.03 16z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="pattern-stamp" title="Pattern Stamp Tool">P</button>
                        </div>
                    </div>

                    <!-- History Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="history-brush" title="History Brush Tool (Y)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="art-history-brush" title="Art History Brush Tool">A</button>
                        </div>
                    </div>

                    <!-- Eraser Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="eraser" title="Eraser Tool (E)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20H7.66l7.57-7.57L20.59 7.07c.78-.78.78-2.05 0-2.83L16.55 3.59c-.39-.39-.9-.59-1.41-.59zM5.03 16L4 17.03 6.97 20l1.03-1.03L5.03 16z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="background-eraser" title="Background Eraser Tool">B</button>
                            <button class="dropdown-tool" data-tool="magic-eraser" title="Magic Eraser Tool">M</button>
                        </div>
                    </div>

                    <!-- Fill Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="gradient" title="Gradient Tool (G)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M11 9h2v2h-2V9zm-2 2h2v2H9v-2zm4 0h2v2h-2v-2zm2-2h2v2h-2V9zM7 9h2v2H7V9zm12-6H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 18H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm2-7h-2v2h2v2h-2v-2h-2v2h-2v-2h-2v2H9v-2H7v2H5v-2h2v-2H5V5h14v6z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="paint-bucket" title="Paint Bucket Tool">P</button>
                            <button class="dropdown-tool" data-tool="3d-material-drop" title="3D Material Drop Tool">3D</button>
                        </div>
                    </div>

                    <!-- Blur/Sharpen Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="blur" title="Blur Tool">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 13c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm6 8c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-3-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm3-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm6 8c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="sharpen" title="Sharpen Tool">S</button>
                            <button class="dropdown-tool" data-tool="smudge" title="Smudge Tool">M</button>
                        </div>
                    </div>

                    <!-- Dodge/Burn Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="dodge" title="Dodge Tool (O)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l-5.5 9h11z"/>
                                <circle cx="17.5" cy="17.5" r="4.5"/>
                                <path d="M3 13.5h8v8H3z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="burn" title="Burn Tool">B</button>
                            <button class="dropdown-tool" data-tool="sponge" title="Sponge Tool">S</button>
                        </div>
                    </div>

                    <!-- Pen Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="pen" title="Pen Tool (P)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="freeform-pen" title="Freeform Pen Tool">F</button>
                            <button class="dropdown-tool" data-tool="curvature-pen" title="Curvature Pen Tool">C</button>
                            <button class="dropdown-tool" data-tool="path-selection" title="Path Selection Tool">A</button>
                            <button class="dropdown-tool" data-tool="direct-selection" title="Direct Selection Tool">D</button>
                        </div>
                    </div>

                    <!-- Type Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="type" title="Horizontal Type Tool (T)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M5 4v3h5.5v12h3V7H19V4z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="type-vertical" title="Vertical Type Tool">V</button>
                            <button class="dropdown-tool" data-tool="type-mask" title="Horizontal Type Mask Tool">M</button>
                            <button class="dropdown-tool" data-tool="type-mask-vertical" title="Vertical Type Mask Tool">VM</button>
                        </div>
                    </div>

                    <!-- Path/Selection Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="path-selection" title="Path Selection Tool (A)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 5h2V3c-1.1 0-2 .9-2 2zm0 8h2v-2H3v2zm4 8h2v-2H7v2zM3 9h2V7H3v2zm10-6h-2v2h2V3zm6 0v2h2c0-1.1-.9-2-2-2zM5 21v-2H3c0 1.1.9 2 2 2zm-2-4h2v-2H3v2zM9 3H7v2h2V3zm2 18h2v-2h-2v2zm8-8h2v-2h-2v2zm0 8c1.1 0 2-.9 2-2h-2v2zm0-12h2V7h-2v2zm0 8h2v-2h-2v2zm-4 4h2v-2h-2v2zm0-16h2V3h-2v2z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="direct-selection" title="Direct Selection Tool">D</button>
                        </div>
                    </div>

                    <!-- Shape Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="rectangle" title="Rectangle Tool (U)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="ellipse" title="Ellipse Tool">E</button>
                            <button class="dropdown-tool" data-tool="triangle" title="Triangle Tool">T</button>
                            <button class="dropdown-tool" data-tool="polygon" title="Polygon Tool">P</button>
                            <button class="dropdown-tool" data-tool="line" title="Line Tool">L</button>
                            <button class="dropdown-tool" data-tool="custom-shape" title="Custom Shape Tool">C</button>
                        </div>
                    </div>

                    <!-- Hand/Zoom Tools -->
                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="hand" title="Hand Tool (H)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/>
                            </svg>
                        </button>
                        <div class="tool-dropdown">
                            <button class="dropdown-tool" data-tool="rotate-view" title="Rotate View Tool">R</button>
                        </div>
                    </div>

                    <div class="tool-slot">
                        <button class="tool-btn" data-tool="zoom" title="Zoom Tool (Z)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Color Selection -->
                <div class="color-section">
                    <div class="color-box" id="foregroundColor" title="Foreground Color">
                        <div class="color-swatch" style="background-color: #000000;"></div>
                    </div>
                    <div class="color-swap" title="Switch Colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l-1.41 1.41L6.17 8H4v2h2.17l4.42 4.41L12 14l6-6-6-6zm0 8.17L9.83 8 12 5.83 14.17 8 12 10.17zM2 20h20v2H2z"/>
                        </svg>
                    </div>
                    <div class="color-box" id="backgroundColor" title="Background Color">
                        <div class="color-swatch" style="background-color: #ffffff;"></div>
                    </div>
                    <div class="color-reset" title="Default Colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.2-.64-1.67-.08-.09-.13-.21-.13-.33 0-.28.22-.5.5-.5H16c3.31 0 6-2.69 6-6 0-4.96-4.49-9-10-9zm-5.5 10c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                        </svg>
                    </div>
                    <div class="quick-mask" title="Edit in Quick Mask Mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                        </svg>
                    </div>
                </div>

                <!-- Screen Mode -->
                <div class="screen-mode">
                    <button class="screen-btn" title="Standard Screen Mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="canvas-area" id="canvasArea">
                <div class="canvas-container">
                    <canvas id="mainCanvas"></canvas>
                    <div class="canvas-overlay" id="canvasOverlay"></div>
                </div>
                <div class="tab-bar">
                    <div class="tab active">
                        <span class="tab-title">Untitled-1</span>
                        <span class="tab-close">×</span>
                    </div>
                </div>
            </div>

            <!-- Right Panels -->
            <div class="panels-container" id="panelsContainer">
                <!-- Color Panel -->
                <div class="panel" id="colorPanel">
                    <div class="panel-header">
                        <span class="panel-title">Color</span>
                        <button class="panel-close">×</button>
                    </div>
                    <div class="panel-content">
                        <div class="color-wheel"></div>
                        <div class="color-sliders">
                            <div class="slider-group">
                                <label>R:</label>
                                <input type="range" id="redSlider" min="0" max="255" value="0">
                                <input type="number" id="redValue" min="0" max="255" value="0">
                            </div>
                            <div class="slider-group">
                                <label>G:</label>
                                <input type="range" id="greenSlider" min="0" max="255" value="0">
                                <input type="number" id="greenValue" min="0" max="255" value="0">
                            </div>
                            <div class="slider-group">
                                <label>B:</label>
                                <input type="range" id="blueSlider" min="0" max="255" value="0">
                                <input type="number" id="blueValue" min="0" max="255" value="0">
                            </div>
                        </div>
                        <div class="hex-input">
                            <label>#:</label>
                            <input type="text" id="hexColor" value="#000000">
                        </div>
                    </div>
                </div>

                <!-- Layers Panel -->
                <div class="panel" id="layersPanel">
                    <div class="panel-header">
                        <span class="panel-title">Layers</span>
                        <div class="panel-actions">
                            <button id="lockPanel">Lock</button>
                            <button class="panel-close">×</button>
                        </div>
                    </div>
                    <div class="panel-content">
                        <div class="layers-toolbar">
                            <button id="addLayer">+</button>
                            <button id="deleteLayer">-</button>
                            <button id="duplicateLayer">Duplicate</button>
                            <button id="addMask">Mask</button>
                            <button id="addAdjustment">Adjustment</button>
                        </div>
                        <div class="layers-list" id="layersList">
                            <div class="layer active" data-layer="0">
                                <div class="layer-thumbnail">
                                    <canvas width="40" height="40"></canvas>
                                </div>
                                <div class="layer-info">
                                    <input type="text" class="layer-name" value="Background">
                                    <div class="layer-opacity">
                                        <input type="range" min="0" max="100" value="100">
                                        <span>100%</span>
                                    </div>
                                </div>
                                <div class="layer-controls">
                                    <button class="layer-visibility active" title="Visibility">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                        </svg>
                                    </button>
                                    <button class="layer-lock" title="Lock">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="layer-modes">
                            <label>Mode:</label>
                            <select id="blendMode">
                                <option value="normal">Normal</option>
                                <option value="multiply">Multiply</option>
                                <option value="screen">Screen</option>
                                <option value="overlay">Overlay</option>
                                <option value="soft-light">Soft Light</option>
                                <option value="hard-light">Hard Light</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Properties Panel -->
                <div class="panel" id="propertiesPanel">
                    <div class="panel-header">
                        <span class="panel-title">Properties</span>
                        <button class="panel-close">×</button>
                    </div>
                    <div class="panel-content">
                        <div id="propertiesContent">
                            <!-- Dynamic properties based on selected tool/layer -->
                        </div>
                    </div>
                </div>

                <!-- Adjustments Panel -->
                <div class="panel" id="adjustmentsPanel">
                    <div class="panel-header">
                        <span class="panel-title">Adjustments</span>
                        <button class="panel-close">×</button>
                    </div>
                    <div class="panel-content">
                        <div class="adjustments-grid">
                            <button class="adjustment-btn" data-adjustment="brightness">Brightness/Contrast</button>
                            <button class="adjustment-btn" data-adjustment="levels">Levels</button>
                            <button class="adjustment-btn" data-adjustment="curves">Curves</button>
                            <button class="adjustment-btn" data-adjustment="exposure">Exposure</button>
                            <button class="adjustment-btn" data-adjustment="vibrance">Vibrance</button>
                            <button class="adjustment-btn" data-adjustment="hue">Hue/Saturation</button>
                            <button class="adjustment-btn" data-adjustment="color-balance">Color Balance</button>
                            <button class="adjustment-btn" data-adjustment="black-white">Black & White</button>
                            <button class="adjustment-btn" data-adjustment="photo-filter">Photo Filter</button>
                            <button class="adjustment-btn" data-adjustment="channel-mixer">Channel Mixer</button>
                            <button class="adjustment-btn" data-adjustment="color-lookup">Color Lookup</button>
                            <button class="adjustment-btn" data-adjustment="invert">Invert</button>
                            <button class="adjustment-btn" data-adjustment="posterize">Posterize</button>
                            <button class="adjustment-btn" data-adjustment="threshold">Threshold</button>
                            <button class="adjustment-btn" data-adjustment="gradient-map">Gradient Map</button>
                            <button class="adjustment-btn" data-adjustment="selective-color">Selective Color</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span id="zoomLevel">100%</span>
                <span id="docSize">800 × 600</span>
                <span id="cursorPos">X: 0, Y: 0</span>
            </div>
            <div class="status-center">
                <span id="toolInfo">Move Tool</span>
            </div>
            <div class="status-right">
                <button id="scrubber">Scrub</button>
                <button id="bridge">Bridge</button>
                <button id="mini-bridge">Mini Bridge</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <script src="photoshop.js"></script>
</body>
</html>
