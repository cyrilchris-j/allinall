<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photopea - Free Online Photo Editor</title>
    <link rel="stylesheet" href="editor-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header Toolbar -->
        <header class="toolbar">
            <div class="toolbar-section">
                <div class="logo">
                    <h1>Photopea</h1>
                </div>
                <div class="menu-bar">
                    <button class="menu-item" data-menu="file">File</button>
                    <button class="menu-item" data-menu="edit">Edit</button>
                    <button class="menu-item" data-menu="image">Image</button>
                    <button class="menu-item" data-menu="layer">Layer</button>
                    <button class="menu-item" data-menu="filter">Filter</button>
                    <button class="menu-item" data-menu="view">View</button>
                    <button class="menu-item" data-menu="help">Help</button>
                </div>
            </div>
        </header>

        <!-- Main Editor Area -->
        <div class="editor-container">
            <!-- Left Toolbar -->
            <div class="left-toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="move" title="Move Tool (V)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M13 6v5h5v-2h2v7h-2v-2h-5v5h-2v-5H6v2H4v-7h2v2h5V6h2z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="select" title="Selection Tool (M)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm9-2h7v7h-7v-7zm2 2v3h3v-3h-3z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="brush" title="Brush Tool (B)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser Tool (E)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20H7.66l7.57-7.57L20.59 7.07c.78-.78.78-2.05 0-2.83L16.55 3.59c-.39-.39-.9-.59-1.41-.59zM5.03 16L4 17.03 6.97 20l1.03-1.03L5.03 16z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="text" title="Text Tool (T)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5 4v3h5.5v12h3V7H19V4z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="shape" title="Shape Tool (U)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eyedropper" title="Eyedropper Tool (I)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42zM6.92 19L5 17.08l8.06-8.06 1.92 1.92L6.92 19z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="zoom" title="Zoom Tool (Z)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="mainCanvas"></canvas>
                    <div class="canvas-overlay" id="canvasOverlay"></div>
                </div>
                <div class="zoom-controls">
                    <button id="zoomOut">-</button>
                    <span id="zoomLevel">100%</span>
                    <button id="zoomIn">+</button>
                    <button id="fitToScreen">Fit</button>
                </div>
            </div>

            <!-- Right Panels -->
            <div class="right-panels">
                <!-- Layers Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>Layers</h3>
                        <div class="panel-actions">
                            <button id="addLayer">+</button>
                            <button id="deleteLayer">-</button>
                        </div>
                    </div>
                    <div class="panel-content">
                        <div id="layersList">
                            <div class="layer active" data-layer="0">
                                <div class="layer-thumbnail"></div>
                                <div class="layer-info">
                                    <span class="layer-name">Background</span>
                                    <span class="layer-opacity">100%</span>
                                </div>
                                <div class="layer-controls">
                                    <input type="checkbox" checked class="layer-visibility">
                                    <input type="range" min="0" max="100" value="100" class="layer-opacity-slider">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Properties Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>Properties</h3>
                    </div>
                    <div class="panel-content">
                        <div class="property-group">
                            <label>Width:</label>
                            <input type="number" id="propWidth" value="800">
                        </div>
                        <div class="property-group">
                            <label>Height:</label>
                            <input type="number" id="propHeight" value="600">
                        </div>
                        <div class="property-group">
                            <label>X:</label>
                            <input type="number" id="propX" value="0">
                        </div>
                        <div class="property-group">
                            <label>Y:</label>
                            <input type="number" id="propY" value="0">
                        </div>
                    </div>
                </div>

                <!-- Color Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>Color</h3>
                    </div>
                    <div class="panel-content">
                        <div class="color-picker">
                            <input type="color" id="foregroundColor" value="#000000">
                            <input type="color" id="backgroundColor" value="#ffffff">
                        </div>
                        <div class="color-values">
                            <input type="text" id="hexColor" value="#000000">
                            <input type="text" id="rgbColor" value="rgb(0,0,0)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Status Bar -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="cursorPosition">X: 0, Y: 0</span>
                <span id="canvasSize">800 × 600</span>
            </div>
            <div class="status-right">
                <span id="toolInfo">Move Tool</span>
            </div>
        </footer>
    </div>

    <!-- File Input (Hidden) -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <script src="editor.js"></script>
</body>
</html>
